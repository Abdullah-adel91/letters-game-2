<!doctype html>
<html lang="ar">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>لعبة الحروف - نسخة مبسطة</title>
<style>
  :root{--accent:#0aa;--bg:#f7f9fb;--card:#fff;--muted:#666}
  html,body{height:100%}
  body{
    font-family: "Noto Sans Arabic", "Segoe UI", Tahoma, Arial, sans-serif;
    direction:rtl;margin:0;padding:18px;background:var(--bg);color:#111;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  }
  .wrap{max-width:920px;margin:18px auto}
  .card{background:var(--card);border-radius:10px;padding:14px;box-shadow:0 6px 18px rgba(10,10,10,0.05);margin-bottom:12px}
  .small{font-size:0.95rem;color:var(--muted)}
  .picker{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;user-select:none}
  .dropdown{position:relative;display:inline-block}
  .letters-list{
    position:absolute;right:0;top:calc(100% + 8px);background:#fff;border:1px solid #ddd;border-radius:8px;padding:8px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);max-height:260px;overflow:auto;z-index:9999;width:320px;display:none;
    -webkit-overflow-scrolling:touch;
  }
  .letters-list.open{display:block}
  .letters-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end}
  .letter-btn{
    padding:10px 12px;border-radius:6px;border:1px solid #eee;background:#fafafa;cursor:pointer;
    font-size:20px;min-width:44px;text-align:center;line-height:1;color:#000;
    font-family:inherit;direction:rtl;
  }
  .letter-btn:hover{background:#f0f8f7}
  .letter-btn:focus{outline:2px solid #bde; outline-offset:2px}
  .question-area{margin-top:12px;font-size:1.2rem;min-height:48px}
  .answer-area{margin-top:8px;font-size:1.05rem;color:#0aa;min-height:32px}
  .mask{color:var(--muted);margin-top:6px}
  .muted{color:var(--muted)}
  hr{border:0;border-top:1px solid #eee;margin:14px 0}
  @media(max-width:640px){ .letters-list{width:100% } .picker{width:100%;justify-content:center} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="uiCard">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
        <div>
          <div class="small">اختر حرف</div>
          <div style="margin-top:8px">
            <div class="dropdown" id="dropdownRoot" aria-haspopup="true" aria-expanded="false">
              <div class="picker" id="openPicker" role="button" aria-label="فتح قائمة الحروف" tabindex="0">
                <span id="selectedLetter">اختر حرفاً</span>
                <svg style="width:18px;height:18px" viewBox="0 0 24 24"><path fill="#666" d="M7 10l5 5 5-5z"/></svg>
              </div>
              <div class="letters-list" id="lettersList" role="menu" aria-hidden="true">
                <div class="letters-grid" id="lettersGrid" aria-label="قائمة الحروف"></div>
              </div>
            </div>
          </div>
        </div>

        <div style="text-align:left;min-width:180px">
          <div class="small">سهل وبسيط</div>
          <div class="note">اضغط على المستطيل لفتح قائمة الحروف ثم اختر حرفاً</div>
        </div>
      </div>

      <div class="question-area" id="questionArea">لا يوجد سؤال بعد. اختر حرفاً.</div>
      <div class="answer-area" id="answerArea"></div>
    </div>

    <!-- تم إزالة قسم الإدارة بالكامل حسب طلبك -->
  </div>

<script>
/* ======= دوال التطبيع ======= */
function removeDiacritics(s){ return s.replace(/[\u0610-\u061A\u064B-\u065F\u06D6-\u06ED]/g,''); }
function normalizeArabic(text){
  if(!text) return '';
  text = String(text).trim().toLowerCase();
  text = removeDiacritics(text);
  text = text.replace(/[^ء-ي\s]/g,'');
  if(text.startsWith('ال')) text = text.slice(2);
  text = text.replace(/[أإآ]/g,'ا').replace(/ى/g,'ي').replace(/ؤ/g,'و').replace(/ئ/g,'ي').replace(/ة/g,'ه');
  text = text.replace(/\s+/g,' ');
  return text;
}
function firstCharAfterNormalize(text){ const n = normalizeArabic(text); return n.length ? n[0] : ''; }

/* ======= تخزين/قراءة (نستخدم فقط للقراءة من localStorage لو فيه بيانات سابقة) ======= */
const STORAGE_KEY = 'qa_bank_v2';
function loadQuestions(){ try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }catch(e){ localStorage.removeItem(STORAGE_KEY); return []; } }

/* ======= عناصر الواجهة ======= */
const letters = 'ا ب ت ث ج ح خ د ذ ر ز س ش ص ض ط ظ ع غ ف ق ك ل م ن ه و ي'.split(' ');
const lettersGrid = document.getElementById('lettersGrid');
const lettersList = document.getElementById('lettersList');
const openPicker = document.getElementById('openPicker');
const dropdownRoot = document.getElementById('dropdownRoot');
const selectedLetterEl = document.getElementById('selectedLetter');
const questionArea = document.getElementById('questionArea');
const answerArea = document.getElementById('answerArea');

let currentLetter = '';
let currentQuestion = null;

/* بناء الحروف */
function buildLetters(){
  const grid = document.getElementById('lettersGrid');
  if(!grid) return;
  grid.innerHTML = '';
  letters.forEach(l=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'letter-btn';
    btn.textContent = l;
    btn.setAttribute('aria-label', 'حرف ' + l);
    btn.addEventListener('click', (ev)=>{
      ev.stopPropagation();
      selectLetter(l);
    });
    btn.addEventListener('keydown', (ev)=>{
      if(ev.key === 'Enter' || ev.key === ' '){
        ev.preventDefault();
        ev.stopPropagation();
        selectLetter(l);
      }
    });
    grid.appendChild(btn);
  });
}

/* فتح/إغلاق القائمة */
function toggleDropdown(open){
  const list = document.getElementById('lettersList');
  const root = document.getElementById('dropdownRoot');
  if(!list || !root) return;
  if(open){
    list.classList.add('open');
    list.style.display = 'block';
    root.setAttribute('aria-expanded','true');
    list.setAttribute('aria-hidden','false');
    const first = list.querySelector('.letter-btn');
    if(first) first.focus();
  } else {
    list.classList.remove('open');
    list.style.display = 'none';
    root.setAttribute('aria-expanded','false');
    list.setAttribute('aria-hidden','true');
    const picker = document.getElementById('openPicker');
    if(picker) picker.focus();
  }
}
openPicker.addEventListener('click', (e)=>{ e.stopPropagation(); const list = document.getElementById('lettersList'); toggleDropdown(!(list && list.classList.contains('open'))); });
openPicker.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); const list=document.getElementById('lettersList'); toggleDropdown(!(list && list.classList.contains('open'))); } else if(e.key==='ArrowDown'){ e.preventDefault(); toggleDropdown(true); } });
document.addEventListener('click', (e)=>{ const root = document.getElementById('dropdownRoot'); if(!root) return; if(!root.contains(e.target)) toggleDropdown(false); });
document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') toggleDropdown(false); });

function selectLetter(l){
  currentLetter = firstCharAfterNormalize(l);
  selectedLetterEl.textContent = l;
  toggleDropdown(false);
  loadRandomForLetter(currentLetter);
}

function loadRandomForLetter(letter){
  const qs = loadQuestions();
  // لو ما فيه أسئلة محلية، نراعي ذلك
  const pool = qs.filter(q => (q.startsWith || '') === letter);
  if(pool.length === 0){
    questionArea.textContent = 'لا يوجد سؤال لهذا الحرف محلياً.';
    answerArea.textContent = '';
    currentQuestion = null;
    return;
  }
  const q = pool[Math.floor(Math.random()*pool.length)];
  currentQuestion = q;
  questionArea.textContent = q.question || '';
  // عرض الإجابة مباشرة تحت السؤال
  answerArea.textContent = (q.answer || '');
}

/* تهيئة أولية */
(function init(){
  buildLetters();
  // لو ما في عناصر مخزنة، نعرض رسالة توضيحية
  const arr = loadQuestions();
  if(!arr || arr.length === 0){
    questionArea.textContent = 'لا توجد أسئلة مخزنة محلياً. استخدم نسخة الإدارة لإضافة أسئلة (الإدارة محذوفة في هذه النسخة).';
    answerArea.textContent = '';
  }
})();
</script>
</body>
</html>
